<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        p {
            color: rgb(222, 250, 250);
            text-shadow: 1px 1px 2px rgb(50, 122, 30);
        }

        div {
            width: 50px;
            height: 50px;
            background-color: aquamarine;
            box-shadow: 0 0 10px black, -2px -2px 3px lightblue;
        }
    </style>
</head>
<body>
   <p>TEKS 1</p> 
   <div></div>
</body>
</html>
