<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleSelector</title>
    <style>
        p {
            color: blue;
            font-weight: bold;
        }

        .merah{
            color: red;
        }

        #hijau{
            color: green;
        }

        #kuning{
            color: yellow;
        }

        #magenta{
            color: magenta;
        }
    </style>
</head>

<body>
  <p>Paragraf 1</p>
  <p>Paragraf 2</p>
  <p>Paragraf 3</p>

  <p class="merah">Paragraf 4</p>
  <p class="merah">Paragraf 5</p>
  <p class="merah">Paragraf 6</p>
  <h4 class="merah">Heading 4</h4>

  <p id="hijau">Paragraf 7</p>
  <p id="kuning">Paragraf 8</p>
  <p id="magenta">Paragraf 9</p>

</body>
</html>
