<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
            }
        
        td, 
        th {
            border: 1px solid rgb(196, 196, 196);
            padding: 5px;
            }
        
        th {
            background-color: rgb(48, 212, 54);
            color: #fff;
            }

        tr {
            transition background-color 3s;
            } 

        tr:nth-child(even){
            background-color: #bbb;
        }

         tr:hover{
            background-color: #bbb;
        }

    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
            </tr>
        </thead>
        <body>
            <tr>
               <td>1</td>
               <td>Hardian</td>
               <td>2302021023</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Bimo</td>
                <td>2302021001</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Jack</td>
                <td>2302021010</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Jhon</td>
                <td>2302021022</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Kyle</td>
                <td>2302021019</td>
            </tr>
        </body>
    </table>
</body>
</html>
